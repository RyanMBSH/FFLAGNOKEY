name: Build e Assinar APK Final
on:
  push:
    branches:
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Ferramentas
        run: |
          mkdir -p bin
          curl -L https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -o bin/apktool.jar
          curl -L https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar -o bin/signer.jar

      - name: Compilar APK
        run: |
          java -jar bin/apktool.jar b . -o app-rebuilt.apk

      - name: Alinhar e Assinar APK
        run: |
          java -jar bin/signer.jar --apks app-rebuilt.apk --allowResign --overwrite

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-Final-Instalavel
          path: ./*.apk
